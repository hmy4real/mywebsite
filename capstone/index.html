<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SteveGPT</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />
  <link rel="stylesheet" href="../css/styles.css?v=20260603c" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js" defer></script>
  <script src="../js/chat-config.js?v=20260603c" defer></script>
  <script src="../js/chatbot.js?v=20260603c" defer></script>
</head>

<body>
  <div class="page">
    <section class="hero">
      <div class="hero-inner">
        <div class="ambient" aria-hidden="true">
          <div class="glow one"></div>
          <div class="glow two"></div>
          <div class="glow three"></div>
          <div class="glass-ribbon left"></div>
          <div class="glass-ribbon right"></div>
          <div class="glass-square"></div>
        </div>

        <div class="hero-copy">
          <h1 class="hero-title"><span class="fill">Hello, I'm SteveGPT</span></h1>
          <div class="hero-subtitle">I am Steve's capstone product</div>

          <section class="chat-shell" aria-label="SteveGPT chat">
            <div class="chat-header">
              <div>
                <div class="chat-name">SteveGPT</div>
                <div class="chat-status">Ready to chat</div>
              </div>
              <div class="chat-actions">
                <button class="chat-clear" id="chatClear" type="button" aria-label="Clear chat history">
                  <svg class="chat-icon" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M3 6h18"></path>
                    <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                    <path d="M10 11v6"></path>
                    <path d="M14 11v6"></path>
                  </svg>
                </button>
                <button class="chat-expand" id="chatExpand" type="button" aria-pressed="false" aria-label="Enter fullscreen">
                  <svg class="chat-icon icon-expand" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3"></path>
                    <path d="M16 3h3a2 2 0 0 1 2 2v3"></path>
                    <path d="M21 16v3a2 2 0 0 1-2 2h-3"></path>
                    <path d="M8 21H5a2 2 0 0 1-2-2v-3"></path>
                  </svg>
                  <svg class="chat-icon icon-collapse" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M8 3v3a2 2 0 0 1-2 2H3"></path>
                    <path d="M16 3v3a2 2 0 0 0 2 2h3"></path>
                    <path d="M21 16h-3a2 2 0 0 0-2 2v3"></path>
                    <path d="M3 16h3a2 2 0 0 1 2 2v3"></path>
                  </svg>
                </button>
              </div>
            </div>

            <div class="chat-messages" id="chatMessages" aria-live="polite">
              <div class="chat-message bot">
                <div class="chat-bubble">Hi, I am SteveGPT. Ask me anything about this capstone demo.</div>
              </div>
            </div>

            <form class="chat-form" id="chatForm">
              <label class="sr-only" for="chatInput">Message SteveGPT</label>
              <input id="chatInput" name="message" type="text" autocomplete="off" placeholder="Talk to SteveGPT" />
              <button type="submit">Send</button>
            </form>
          </section>
        </div>
      </div>
    </section>
  </div>
</body>

</html>
