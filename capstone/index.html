<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SteveGPT</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" />
  <link rel="stylesheet" href="../css/capstone.css?v=20260607-files" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js" defer></script>
  <script src="../js/chat-config.js?v=20260603" defer></script>
  <script src="../js/chatbot.js?v=20260607-files" defer></script>
  <script src="../js/capstone-ui.js?v=20260607-files" defer></script>
</head>

<body class="capstone-page">
  <div class="page">
    <section class="hero">
      <div class="hero-inner">
        <div class="ambient" aria-hidden="true">
        </div>

        <div class="hero-copy">
          <section class="chat-shell" aria-label="SteveGPT chat">
            <div class="chat-header">
              <div class="chat-name">SteveGPT</div>
              <button class="chat-clear" id="chatClear" type="button" aria-label="Clear chat history" title="Clear chat history">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M3 6h18"></path>
                  <path d="M8 6V4h8v2"></path>
                  <path d="m19 6-1 14H6L5 6"></path>
                  <path d="M10 11v6"></path>
                  <path d="M14 11v6"></path>
                </svg>
              </button>
            </div>

            <div class="chat-messages" id="chatMessages" aria-live="polite">
              <div class="chat-empty-state" id="chatEmptyState">Where should we begin?</div>
            </div>

            <form class="chat-form" id="chatForm">
              <button class="chat-attach" id="chatAttach" type="button" aria-label="Attach files" title="Attach files">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M12 5v14"></path>
                  <path d="M5 12h14"></path>
                </svg>
              </button>
              <input class="chat-file-input" id="chatUpload" type="file" accept="image/*,.txt,.md,.csv,.json,.js,.html,.css,.py,.java,.pdf" multiple />
              <label class="sr-only" for="chatInput">Message SteveGPT</label>
              <div class="chat-input-wrap">
                <input id="chatInput" name="message" type="text" autocomplete="off" placeholder="Talk to SteveGPT" />
                <button class="chat-send" id="chatSubmit" type="submit">Send</button>
              </div>
              <div class="attachment-tray" id="attachmentTray" hidden></div>
            </form>
          </section>
        </div>
      </div>
    </section>
  </div>
</body>

</html>
