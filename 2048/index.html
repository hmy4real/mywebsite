<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>2048</title>
    <style>
      :root {
        --page: #faf8ef;
        --text: #776e65;
        --muted: #8f7a66;
        --grid: #bbada0;
        --cell: rgba(238, 228, 218, 0.35);
        --button: #8f7a66;
        --button-hover: #9f8b78;
        --tile-2: #eee4da;
        --tile-4: #ede0c8;
        --tile-8: #f2b179;
        --tile-16: #f59563;
        --tile-32: #f67c5f;
        --tile-64: #f65e3b;
        --tile-128: #edcf72;
        --tile-256: #edcc61;
        --tile-512: #edc850;
        --tile-1024: #edc53f;
        --tile-2048: #edc22e;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.45), transparent 34rem),
          var(--page);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        overscroll-behavior: none;
      }

      button {
        font: inherit;
      }

      .page {
        width: min(31.25rem, calc(100vw - 1.5rem));
        min-height: 100vh;
        margin: 0 auto;
        padding: clamp(0.85rem, 3vh, 2rem) 0;
        display: grid;
        align-content: center;
        gap: 1rem;
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      h1 {
        margin: 0;
        color: var(--text);
        font-size: clamp(3.2rem, 16vw, 5rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      .scores {
        display: flex;
        gap: 0.45rem;
      }

      .score-box {
        min-width: 5.15rem;
        padding: 0.58rem 0.7rem 0.52rem;
        border-radius: 6px;
        background: var(--grid);
        color: #fff;
        text-align: center;
      }

      .score-box span {
        display: block;
        color: #eee4da;
        font-size: 0.72rem;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .score-box strong {
        display: block;
        min-width: 3rem;
        margin-top: 0.18rem;
        font-size: 1.45rem;
        line-height: 1;
      }

      .intro {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .intro p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.35;
      }

      .new-game,
      .keep-playing {
        min-height: 2.65rem;
        border: 0;
        border-radius: 5px;
        background: var(--button);
        color: #f9f6f2;
        cursor: pointer;
        font-weight: 700;
        padding: 0 1.05rem;
        white-space: nowrap;
      }

      .new-game:hover,
      .keep-playing:hover {
        background: var(--button-hover);
      }

      .board {
        position: relative;
        width: min(calc(100vw - 1.5rem), 31.25rem, calc(100vh - 15rem));
        aspect-ratio: 1;
        margin: 0 auto;
        border-radius: 6px;
        background: var(--grid);
        padding: 0.75rem;
        touch-action: none;
        user-select: none;
        box-shadow: 0 1.15rem 2.6rem rgba(119, 110, 101, 0.16);
      }

      .grid,
      .tiles {
        position: absolute;
        inset: 0.75rem;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 0.75rem;
      }

      .cell {
        border-radius: 4px;
        background: var(--cell);
      }

      .tile {
        display: grid;
        place-items: center;
        border-radius: 4px;
        color: #776e65;
        font-size: clamp(1.8rem, 9vw, 3.45rem);
        font-weight: 700;
        line-height: 1;
        transition:
          transform 110ms ease-in-out,
          opacity 110ms ease-in-out;
        will-change: transform;
      }

      .tile-new {
        animation: appear 140ms ease-out;
      }

      .tile-merged {
        animation: pop 160ms ease-out;
      }

      .tile[data-value="2"] {
        background: var(--tile-2);
      }

      .tile[data-value="4"] {
        background: var(--tile-4);
      }

      .tile[data-value="8"] {
        background: var(--tile-8);
        color: #f9f6f2;
      }

      .tile[data-value="16"] {
        background: var(--tile-16);
        color: #f9f6f2;
      }

      .tile[data-value="32"] {
        background: var(--tile-32);
        color: #f9f6f2;
      }

      .tile[data-value="64"] {
        background: var(--tile-64);
        color: #f9f6f2;
      }

      .tile[data-value="128"] {
        background: var(--tile-128);
        color: #f9f6f2;
        font-size: clamp(1.55rem, 7.5vw, 2.9rem);
      }

      .tile[data-value="256"] {
        background: var(--tile-256);
        color: #f9f6f2;
        font-size: clamp(1.55rem, 7.5vw, 2.9rem);
      }

      .tile[data-value="512"] {
        background: var(--tile-512);
        color: #f9f6f2;
        font-size: clamp(1.55rem, 7.5vw, 2.9rem);
      }

      .tile[data-value="1024"] {
        background: var(--tile-1024);
        color: #f9f6f2;
        font-size: clamp(1.25rem, 6.5vw, 2.35rem);
      }

      .tile[data-value="2048"] {
        background: var(--tile-2048);
        color: #f9f6f2;
        font-size: clamp(1.25rem, 6.5vw, 2.35rem);
        box-shadow: 0 0 1.9rem rgba(237, 194, 46, 0.38);
      }

      .tile-super {
        background: #3c3a32;
        color: #f9f6f2;
        font-size: clamp(1rem, 5.6vw, 2rem);
      }

      .message {
        position: absolute;
        inset: 0;
        z-index: 3;
        display: none;
        place-items: center;
        padding: 1.5rem;
        border-radius: 6px;
        background: rgba(238, 228, 218, 0.73);
        text-align: center;
      }

      .message.show {
        display: grid;
      }

      .message h2 {
        margin: 0 0 1rem;
        color: var(--text);
        font-size: clamp(2.2rem, 10vw, 3.8rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .message-actions {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .footer {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.4;
      }

      @keyframes appear {
        from {
          opacity: 0;
          transform: scale(0);
        }

        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes pop {
        50% {
          transform: scale(1.12);
        }
      }

      @media (max-width: 520px) {
        .page {
          width: min(100vw - 1rem, 31.25rem);
          gap: 0.75rem;
          align-content: start;
        }

        .top {
          align-items: flex-start;
        }

        .scores {
          flex-direction: column;
        }

        .score-box {
          min-width: 4.65rem;
          padding-inline: 0.55rem;
        }

        .intro {
          align-items: flex-start;
        }

        .intro p {
          font-size: 0.94rem;
        }

        .board {
          width: min(calc(100vw - 1rem), calc(100vh - 13rem));
          padding: 0.55rem;
        }

        .grid,
        .tiles {
          inset: 0.55rem;
          gap: 0.55rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="top">
        <h1>2048</h1>
        <div class="scores" aria-label="Scores">
          <div class="score-box">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="score-box">
            <span>Best</span>
            <strong id="best">0</strong>
          </div>
        </div>
      </header>

      <section class="intro" aria-label="Game controls">
        <p>Join the tiles, get to <strong>2048</strong>.</p>
        <button class="new-game" id="newGame" type="button">New Game</button>
      </section>

      <section class="board" id="board" aria-label="2048 board" tabindex="0">
        <div class="grid" aria-hidden="true">
          <span class="cell"></span>
          <span class="cell"></span>
          <span class="cell"></span>
          <span class="cell"></span>
          <span class="cell"></span>
          <span class="cell"></span>
          <span class="cell"></span>
          <span class="cell"></span>
          <span class="cell"></span>
          <span class="cell"></span>
          <span class="cell"></span>
          <span class="cell"></span>
          <span class="cell"></span>
          <span class="cell"></span>
          <span class="cell"></span>
          <span class="cell"></span>
        </div>
        <div class="tiles" id="tiles" aria-live="polite"></div>
        <div class="message" id="message">
          <div>
            <h2 id="messageTitle">Game over!</h2>
            <div class="message-actions">
              <button class="new-game" id="tryAgain" type="button">Try Again</button>
              <button class="keep-playing" id="keepPlaying" type="button">Keep Going</button>
            </div>
          </div>
        </div>
      </section>

      <p class="footer">Use arrow keys on computer or swipe on phone.</p>
    </main>

    <script>
      const size = 4;
      const boardEl = document.querySelector("#board");
      const tilesEl = document.querySelector("#tiles");
      const scoreEl = document.querySelector("#score");
      const bestEl = document.querySelector("#best");
      const messageEl = document.querySelector("#message");
      const messageTitleEl = document.querySelector("#messageTitle");
      const newGameButton = document.querySelector("#newGame");
      const tryAgainButton = document.querySelector("#tryAgain");
      const keepPlayingButton = document.querySelector("#keepPlaying");

      let cells = [];
      let score = 0;
      let best = Number(localStorage.getItem("classic-2048-best") || 0);
      let won = false;
      let keepPlaying = false;
      let startTouch = null;

      bestEl.textContent = best;

      function emptyBoard() {
        return Array.from({ length: size }, () => Array(size).fill(0));
      }

      function startGame() {
        cells = emptyBoard();
        score = 0;
        won = false;
        keepPlaying = false;
        hideMessage();
        addRandomTile();
        addRandomTile();
        render();
        boardEl.focus({ preventScroll: true });
      }

      function addRandomTile() {
        const empty = [];
        for (let row = 0; row < size; row += 1) {
          for (let col = 0; col < size; col += 1) {
            if (!cells[row][col]) empty.push({ row, col });
          }
        }

        if (!empty.length) return;
        const spot = empty[Math.floor(Math.random() * empty.length)];
        cells[spot.row][spot.col] = Math.random() < 0.9 ? 2 : 4;
      }

      function render(merged = []) {
        tilesEl.innerHTML = "";
        const mergedKeys = new Set(merged.map((tile) => `${tile.row}-${tile.col}`));

        cells.forEach((row, rowIndex) => {
          row.forEach((value, colIndex) => {
            if (!value) return;

            const tile = document.createElement("div");
            tile.className = "tile";
            tile.dataset.value = value;
            tile.textContent = value;
            tile.style.gridRow = rowIndex + 1;
            tile.style.gridColumn = colIndex + 1;

            if (value > 2048) tile.classList.add("tile-super");
            if (mergedKeys.has(`${rowIndex}-${colIndex}`)) tile.classList.add("tile-merged");

            tilesEl.appendChild(tile);
          });
        });

        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          localStorage.setItem("classic-2048-best", String(best));
        }
        bestEl.textContent = best;
      }

      function move(direction) {
        if (messageEl.classList.contains("show")) return;

        const before = boardSignature();
        const merged = [];

        if (direction === "left") {
          for (let row = 0; row < size; row += 1) {
            cells[row] = collapseLine(cells[row], row, false, merged);
          }
        }

        if (direction === "right") {
          for (let row = 0; row < size; row += 1) {
            cells[row] = collapseLine([...cells[row]].reverse(), row, true, merged).reverse();
          }
        }

        if (direction === "up") {
          for (let col = 0; col < size; col += 1) {
            const line = cells.map((row) => row[col]);
            const collapsed = collapseLine(line, col, false, merged, true);
            collapsed.forEach((value, row) => {
              cells[row][col] = value;
            });
          }
        }

        if (direction === "down") {
          for (let col = 0; col < size; col += 1) {
            const line = cells.map((row) => row[col]).reverse();
            const collapsed = collapseLine(line, col, true, merged, true).reverse();
            collapsed.forEach((value, row) => {
              cells[row][col] = value;
            });
          }
        }

        if (before === boardSignature()) return;

        addRandomTile();
        render(merged);
        checkState();
      }

      function collapseLine(line, fixedIndex, reversed, merged, vertical = false) {
        const values = line.filter(Boolean);
        const result = [];

        for (let index = 0; index < values.length; index += 1) {
          if (values[index] === values[index + 1]) {
            const value = values[index] * 2;
            score += value;
            result.push(value);
            index += 1;

            const target = result.length - 1;
            const coordinate = reversed ? size - 1 - target : target;
            merged.push(
              vertical
                ? { row: coordinate, col: fixedIndex }
                : { row: fixedIndex, col: coordinate },
            );

            if (value === 2048 && !won && !keepPlaying) {
              won = true;
            }
          } else {
            result.push(values[index]);
          }
        }

        while (result.length < size) result.push(0);
        return result;
      }

      function checkState() {
        if (won && !keepPlaying) {
          showMessage("You win!");
          return;
        }

        if (!canMove()) {
          showMessage("Game over!");
        }
      }

      function canMove() {
        for (let row = 0; row < size; row += 1) {
          for (let col = 0; col < size; col += 1) {
            const value = cells[row][col];
            if (!value) return true;
            if (cells[row][col + 1] === value) return true;
            if (cells[row + 1]?.[col] === value) return true;
          }
        }
        return false;
      }

      function boardSignature() {
        return cells.flat().join(",");
      }

      function showMessage(text) {
        messageTitleEl.textContent = text;
        keepPlayingButton.style.display = text === "You win!" ? "inline-block" : "none";
        messageEl.classList.add("show");
      }

      function hideMessage() {
        messageEl.classList.remove("show");
      }

      document.addEventListener("keydown", (event) => {
        const directions = {
          ArrowUp: "up",
          ArrowDown: "down",
          ArrowLeft: "left",
          ArrowRight: "right",
        };

        if (!directions[event.key]) return;
        event.preventDefault();
        move(directions[event.key]);
      });

      boardEl.addEventListener("pointerdown", (event) => {
        startTouch = { x: event.clientX, y: event.clientY };
      });

      boardEl.addEventListener("pointerup", (event) => {
        if (!startTouch) return;
        const dx = event.clientX - startTouch.x;
        const dy = event.clientY - startTouch.y;
        startTouch = null;

        if (Math.max(Math.abs(dx), Math.abs(dy)) < 18) return;
        move(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? "right" : "left") : dy > 0 ? "down" : "up");
      });

      newGameButton.addEventListener("click", startGame);
      tryAgainButton.addEventListener("click", startGame);
      keepPlayingButton.addEventListener("click", () => {
        keepPlaying = true;
        hideMessage();
        boardEl.focus({ preventScroll: true });
      });

      startGame();
    </script>
  </body>
</html>
